<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT-Blur</title>
  </head>
  <body>
    <main class="popup-root">
      <header class="popup-header">
        <span class="popup-brand" id="popup-brand"></span>
      </header>
      <label class="popup-row" for="blur-toggle">
        <span class="popup-label" id="popup-label"></span>
        <span class="popup-switch">
          <input type="checkbox" id="blur-toggle" class="popup-input" />
          <span class="popup-track" aria-hidden="true"></span>
        </span>
      </label>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
